<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fée Noire - Bảng Giá Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Sansita+Swashed:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-custom.css">
</head>
<body class="staff-page-bg">

    <header class="navbar">
        <div class="logo">Fée Noire</div>
        <nav class="nav-links d-flex align-items-center">
            <a href="index.html">Trang Chủ</a>
             <!-- Dropdown Câu Chuyện -->
            <div class="nav-dropdown-wrapper">
                <a href="#" class="nav-dropdown-trigger">
                    Câu Chuyện <i class="fa-solid fa-chevron-down ms-1" style="font-size:0.7rem;"></i>
                </a>
                <div class="nav-dropdown-menu">
                    <a href="cauchuyen.html"><i class="fa-solid fa-book-open me-2"></i>Câu Chuyện</a>
                    <a href="trananh.html"><i class="fa-solid fa-images me-2"></i>Tranh Ảnh</a>
                </div>
            </div>
            <a href="nhanvien.html">Staff</a>
            <a href="banggia.html" class="active">Bảng Giá</a>
            <a href="https://haznox2260.github.io/FN_fo/">Đặt Đơn</a>
            <a id="navManageLink" href="admin.html" class="btn-admin" style="display:none;">Quản Lý</a>
            <button id="navAuthBtn" class="btn btn-sm btn-outline-warning rounded-pill px-3 ms-3"
                data-bs-toggle="offcanvas" data-bs-target="#authOffcanvas">
                <i class="fa-solid fa-user-shield me-1"></i>
                <span id="navUserText">Đăng Nhập</span>
            </button>
        </nav>
    </header>

    <main class="container json-staff-container" style="max-width: 900px;">
        <div class="text-center section-header">
            <h1 class="page-title">Bảng Giá Dịch Vụ</h1>
            <p class="page-subtitle">Tìm kiếm dịch vụ phù hợp với hành trình Sky của bạn</p>
        </div>

        <!-- Ô Tìm Kiếm Dịch Vụ -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="input-group search-box-wrapper">
                    <span class="input-group-text bg-transparent border-end-0 text-white-50">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="priceSearchInput" class="form-control bg-transparent text-white border-start-0 custom-search-input" 
                        placeholder="Nhập tên dịch vụ bạn cần tìm kiếm giá..." onkeyup="searchPrice()">
                </div>
            </div>
        </div>

        <!-- Bộ Lọc Danh Mục -->
        <div class="d-flex justify-content-center mb-5 flex-wrap filter-buttons-group">
            <button class="btn filter-btn active" onclick="filterPrice('all', this)">Tất cả</button>
            <button class="btn filter-btn" onclick="filterPrice('uber', this)">⭐️ Uber</button>
            <button class="btn filter-btn" onclick="filterPrice('logacc', this)">🔑 Logacc</button>
            <button class="btn filter-btn" onclick="filterPrice('host', this)">🌙 Host tâm sự</button>
        </div>

        <!-- Loading -->
        <div id="priceLoading" class="text-center py-5">
            <div class="spinner-border" style="color:var(--accent-glow);"></div>
            <p class="text-white-50 small mt-2">Đang tải bảng giá...</p>
        </div>

        <!-- Danh sách hiển thị giá dạng Card mờ kính -->
        <div id="priceContainer" class="row g-4">
            <!-- Dữ liệu render từ Google Sheets tại đây -->
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Fée Noire. All rights reserved. Khơi nguồn phép thuật trong thế giới Sky.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // =========================================================
        //  DỮ LIỆU BẢNG GIÁ — KẾT NỐI THẬT GOOGLE SHEETS (sheet "Prices")
        // =========================================================
        let allPrices = [];
        let activeFilter = 'all';

        function categoryBadgeClass(cat) {
            if (cat === 'uber') return 'badge-cat-uber';
            if (cat === 'logacc') return 'badge-cat-logacc';
            if (cat === 'host') return 'badge-cat-host';
            return 'bg-secondary';
        }

        async function loadPrices() {
            const loadingBox = document.getElementById('priceLoading');
            const container = document.getElementById('priceContainer');
            loadingBox.style.display = 'block';
            container.innerHTML = '';

            try {
                const url = new URL(FEE_NOIRE_CONFIG.GAS_URL);
                url.searchParams.set('action', 'getPrices');
                const res = await fetch(url.toString());
                const data = await res.json();

                if (data.status !== 'ok') throw new Error(data.message || 'Lỗi không xác định');

                allPrices = data.prices || [];
                loadingBox.style.display = 'none';
                renderPrices(allPrices);
            } catch (e) {
                loadingBox.style.display = 'none';
                container.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state-box">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <p class="mb-2">Không thể tải bảng giá. Vui lòng thử lại sau.</p>
                            <button class="btn btn-sm btn-outline-light" onclick="loadPrices()">Thử lại</button>
                        </div>
                    </div>`;
            }
        }

        function renderPrices(list) {
            const container = document.getElementById('priceContainer');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state-box">
                            <i class="fa-solid fa-tags"></i>
                            <p class="mb-0">Không tìm thấy dịch vụ nào phù hợp với từ khóa của bạn.</p>
                        </div>
                    </div>`;
                return;
            }

            list.forEach(item => {
                const subtypeLabel = item.subtype ? `<span class="text-white-50 small ms-1">- ${item.subtype}</span>` : '';
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="skykid-card h-100 d-flex flex-column justify-content-between">
                            <div>
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h4 class="text-white font-dancing-script mb-0 fs-5">${item.name}</h4>
                                    <span class="badge ${categoryBadgeClass(item.category)} text-uppercase">${item.category}</span>
                                </div>
                                <div class="mb-2">${subtypeLabel}</div>
                                <p class="text-white-50 small mt-3 mb-4">${item.desc || ''}</p>
                            </div>
                            <div class="border-top border-secondary border-opacity-25 pt-3 d-flex justify-content-between align-items-center">
                                <span class="text-white-50 small">Giá dịch vụ:</span>
                                <span class="text-warning fw-bold fs-5" style="text-shadow: 0 0 10px rgba(187,134,252,0.2);">${item.price}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterPrice(category, btn) {
            activeFilter = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('priceSearchInput').value = '';

            const filtered = category === 'all' ? allPrices : allPrices.filter(p => p.category === category);
            renderPrices(filtered);
        }

        function searchPrice() {
            const keyword = document.getElementById('priceSearchInput').value.toLowerCase().trim();
            const filtered = allPrices.filter(p => {
                const matchesKeyword = p.name.toLowerCase().includes(keyword)
                    || (p.desc || '').toLowerCase().includes(keyword)
                    || (p.subtype || '').toLowerCase().includes(keyword);
                const matchesCategory = activeFilter === 'all' || p.category === activeFilter;
                return matchesKeyword && matchesCategory;
            });
            renderPrices(filtered);
        }

        // Khởi chạy ban đầu — tải dữ liệu thật từ Google Sheets
        document.addEventListener('DOMContentLoaded', loadPrices);
    </script>
</body>
</html>
