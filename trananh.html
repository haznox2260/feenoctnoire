<head>

  <style id="fn-mobile-nav-css">
    @media (max-width: 768px) {
      .navbar { padding: 0 16px !important; height: 62px; }

  <style>
    /* ── PAGE HEADER ── */
    .gallery-page-bg { padding-top: 110px; min-height: 100vh; }

    /* ── FILTER TAGS ── */
    .gallery-tag-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(187,134,252,0.2);
      color: rgba(255,255,255,0.65);
      border-radius: 20px;
      padding: 6px 20px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }
    .gallery-tag-btn:hover {
      border-color: rgba(187,134,252,0.5);
      color: #e0c7ff;
      background: rgba(187,134,252,0.08);
    }
    .gallery-tag-btn.active {
      background: rgba(187,134,252,0.18);
      border-color: #bb86fc;
      color: #bb86fc;
      box-shadow: 0 0 12px rgba(187,134,252,0.2);
    }

    /* ── MASONRY GRID ── */
    .gallery-masonry {
      columns: 3;
      column-gap: 16px;
      padding: 0 0 80px;
    }
    @media (max-width: 900px) { .gallery-masonry { columns: 2; } }
    @media (max-width: 540px) { .gallery-masonry { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(187,134,252,0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      background: rgba(14,11,20,0.6);
    }
    .gallery-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px rgba(187,134,252,0.15);
      border-color: rgba(187,134,252,0.45);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      border-radius: 14px;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.04); }

    /* ── HOVER CAPTION ── */
    .gallery-caption-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7,6,14,0.9) 0%, rgba(7,6,14,0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px 16px 14px;
      border-radius: 14px;
    }
    .gallery-item:hover .gallery-caption-overlay { opacity: 1; }
    .gallery-caption-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.15rem;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(187,134,252,0.5);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .gallery-caption-tag {
      font-size: 0.72rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bb86fc;
      opacity: 0.85;
    }
    .gallery-zoom-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px; height: 32px;
      background: rgba(14,11,20,0.7);
      border: 1px solid rgba(187,134,252,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #bb86fc; font-size: 0.75rem;
      opacity: 0; transition: opacity 0.25s ease;
    }
    .gallery-item:hover .gallery-zoom-icon { opacity: 1; }

    /* ── LIGHTBOX ── */
    #fnLightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(4,3,10,0.96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(12px);
    }
    #fnLightbox.lb-open { opacity: 1; pointer-events: all; }

    .lb-img-wrap {
      position: relative;
      max-width: min(90vw, 1000px);
      max-height: 85vh;
      display: flex; align-items: center; justify-content: center;
    }
    #lbImg {
      max-width: 100%; max-height: 80vh;
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(187,134,252,0.1);
      border: 1px solid rgba(187,134,252,0.2);
      object-fit: contain;
      transition: opacity 0.2s ease;
    }
    #lbImg.lb-loading { opacity: 0.3; }

    .lb-caption {
      position: absolute;
      bottom: -56px; left: 0; right: 0;
      text-align: center;
    }
    .lb-caption-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(187,134,252,0.5);
    }
    .lb-caption-tag {
      font-size: 0.72rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #bb86fc;
      margin-top: 2px;
    }

    .lb-btn {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid rgba(187,134,252,0.35);
      background: rgba(14,11,20,0.8);
      color: #bb86fc; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 9001;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }
    .lb-btn:hover {
      background: rgba(187,134,252,0.2);
      box-shadow: 0 0 18px rgba(187,134,252,0.35);
      border-color: #bb86fc;
    }
    #lbPrev { left: 16px; }
    #lbNext { right: 16px; }

    .lb-close {
      position: fixed; top: 18px; right: 18px;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,71,87,0.35);
      background: rgba(14,11,20,0.8);
      color: rgba(255,71,87,0.8); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 9001;
      transition: all 0.2s ease;
    }
    .lb-close:hover {
      background: rgba(255,71,87,0.2);
      border-color: #ff4757; color: #ff4757;
    }

    .lb-counter {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; z-index: 9001;
    }

    /* ── EMPTY / LOADING ── */
    .gallery-spinner {
      text-align: center; padding: 80px 20px;
      color: rgba(187,134,252,0.5);
    }
    .gallery-spinner .spinner-border { color: #bb86fc; width: 2.2rem; height: 2.2rem; }

    /* ── FADE IN items ── */
    @keyframes galFadeIn {
      from { opacity:0; transform: translateY(16px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1); }
    }
    .gallery-item { animation: galFadeIn 0.45s ease both; }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // =========================================================
    //  DATA
    // =========================================================
    let allGallery   = [];
    let filteredList = [];
    let lbIndex      = 0;
    let activeTag    = 'all';

    // =========================================================
    //  LOAD TỪ GAS
    // =========================================================
    async function loadGallery() {
      try {
        const url = new URL(FEE_NOIRE_CONFIG.GAS_URL);
        url.searchParams.set('action', 'getGallery');
        const res  = await fetch(url.toString());
        const data = await res.json();
        if (data.status !== 'ok') throw new Error(data.message);
        allGallery = data.gallery || [];
        buildTagFilter();
        applyFilter('all');
        document.getElementById('galleryLoading').style.display = 'none';
        document.getElementById('galleryGrid').style.display    = '';
      } catch (e) {
        document.getElementById('galleryLoading').innerHTML = `
          <i class="fa-solid fa-triangle-exclamation mb-3" style="font-size:2rem;color:var(--accent-danger);display:block;"></i>
          <p class="small">Không thể tải tranh ảnh. <button class="btn btn-sm btn-outline-light mt-2" onclick="loadGallery()">Thử lại</button></p>`;
      }
    }

    // =========================================================
    //  BUILD TAG BUTTONS (tự động từ data)
    // =========================================================
    function buildTagFilter() {
      const tags = [...new Set(allGallery.map(g => g.tag).filter(Boolean))];
      const row  = document.getElementById('tagFilterRow');
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'gallery-tag-btn';
        btn.textContent = tag;
        btn.onclick = () => filterGallery(tag, btn);
        row.appendChild(btn);
      });
    }

    // =========================================================
    //  FILTER
    // =========================================================
    function filterGallery(tag, btn) {
      activeTag = tag;
      document.querySelectorAll('.gallery-tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(tag);
    }

    function applyFilter(tag) {
      filteredList = tag === 'all' ? allGallery : allGallery.filter(g => g.tag === tag);
      renderGallery(filteredList);
    }

    // =========================================================
    //  RENDER MASONRY
    // =========================================================
    function renderGallery(list) {
      const grid  = document.getElementById('galleryGrid');
      const empty = document.getElementById('galleryEmpty');
      grid.innerHTML = '';

      if (!list.length) {
        grid.style.display  = 'none';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      grid.style.display  = '';

      list.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.style.animationDelay = (idx * 0.04) + 's';
        div.innerHTML = `
          <img src="${item.img}" alt="${item.caption || ''}" loading="lazy"
               onerror="this.closest('.gallery-item').style.display='none'">
          <div class="gallery-caption-overlay">
            <div class="gallery-caption-title">${item.caption || ''}</div>
            ${item.tag ? `<div class="gallery-caption-tag">✦ ${item.tag}</div>` : ''}
          </div>
          <div class="gallery-zoom-icon"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        `;
        div.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(div);
      });
    }

    // =========================================================
    //  LIGHTBOX
    // =========================================================
    const lb      = document.getElementById('fnLightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbTitle = document.getElementById('lbTitle');
    const lbTag   = document.getElementById('lbTag');
    const lbCnt   = document.getElementById('lbCounter');

    function openLightbox(idx) {
      lbIndex = idx;
      lb.classList.add('lb-open');
      document.body.style.overflow = 'hidden';
      showLbSlide(idx);
    }

    function closeLightbox() {
      lb.classList.remove('lb-open');
      document.body.style.overflow = '';
    }

    function showLbSlide(idx) {
      lbIndex = ((idx % filteredList.length) + filteredList.length) % filteredList.length;
      const item = filteredList[lbIndex];
      lbImg.classList.add('lb-loading');
      lbImg.onload = () => lbImg.classList.remove('lb-loading');
      lbImg.src    = item.img;
      lbImg.alt    = item.caption || '';
      lbTitle.textContent = item.caption || '';
      lbTag.textContent   = item.tag ? '✦ ' + item.tag : '';
      lbCnt.textContent   = (lbIndex + 1) + ' / ' + filteredList.length;
    }

    document.getElementById('lbClose').onclick = closeLightbox;
    document.getElementById('lbPrev').onclick  = () => showLbSlide(lbIndex - 1);
    document.getElementById('lbNext').onclick  = () => showLbSlide(lbIndex + 1);

    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('lb-open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  showLbSlide(lbIndex - 1);
      if (e.key === 'ArrowRight') showLbSlide(lbIndex + 1);
    });

    // =========================================================
    //  INIT
    // =========================================================
    document.addEventListener('DOMContentLoaded', loadGallery);
  </script>
</body>
