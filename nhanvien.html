<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fée Noire - Đội Ngũ Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Sansita+Swashed:wght@300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-custom.css">
</head>

<body class="staff-page-bg">

    <header class="navbar">
        <div class="logo">Fée Noire</div>
        <nav class="nav-links d-flex align-items-center">
            <a href="index.html">Trang Chủ</a>
             <!-- Dropdown Câu Chuyện -->
            <div class="nav-dropdown-wrapper">
                <a href="#" class="nav-dropdown-trigger">
                    Câu Chuyện <i class="fa-solid fa-chevron-down ms-1" style="font-size:0.7rem;"></i>
                </a>
                <div class="nav-dropdown-menu">
                    <a href="cauchuyen.html"><i class="fa-solid fa-book-open me-2"></i>Câu Chuyện</a>
                    <a href="trananh.html"><i class="fa-solid fa-images me-2"></i>Tranh Ảnh</a>
                </div>
            </div>
            <a href="nhanvien.html">Staff</a>
            <a href="banggia.html">Bảng Giá</a>
            <a href="https://haznox2260.github.io/FN_fo/">Đặt Đơn</a>
            <a id="navManageLink" href="admin.html" class="btn-admin" style="display:none;">Quản Lý</a>
            <button id="navAuthBtn" class="btn btn-sm btn-outline-warning rounded-pill px-3 ms-3"
                data-bs-toggle="offcanvas" data-bs-target="#authOffcanvas">
                <i class="fa-solid fa-user-shield me-1"></i>
                <span id="navUserText">Đăng Nhập</span>
            </button>
        </nav>
    </header>

    <main class="container json-staff-container" style="max-width: 800px;">
        <div class="text-center section-header">
            <h1 class="page-title">Skykid Cards</h1>
            <p class="page-subtitle">Gặp gỡ những người bạn bí ẩn đồng hành cùng bạn.</p>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="input-group search-box-wrapper">
                    <span class="input-group-text bg-transparent border-end-0 text-white-50"><i
                            class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="staffSearchInput"
                        class="form-control bg-transparent text-white border-start-0 custom-search-input"
                        placeholder="Nhập tên Staff cần tìm..." onkeyup="searchStaff()">
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mb-5 flex-wrap filter-buttons-group">
            <button class="btn filter-btn active" onclick="filterStaff('all', this)">Tất cả</button>
            <button class="btn filter-btn" onclick="filterStaff('uber', this)">Uber</button>
            <button class="btn filter-btn" onclick="filterStaff('logacc', this)">Logacc</button>
            <button class="btn filter-btn" onclick="filterStaff('host', this)">Host</button>
            <button class="btn filter-btn" onclick="filterStaff('trực', this)">Trực</button>
            <button class="btn filter-btn" onclick="filterStaff('artist', this)">Artist</button>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-purple mb-3" style="color: var(--accent-glow);"></div>
            <p class="text-white-50 small">Đang triệu hồi các Hắc Tiên...</p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="text-center py-5" style="display:none;">
            <i class="fa-solid fa-triangle-exclamation mb-3" style="font-size:2.5rem; color: var(--accent-danger);"></i>
            <p class="text-white-50">Không thể kết nối. Vui lòng thử lại.</p>
            <button class="btn btn-submit-comment mt-2" onclick="loadStaff()">Thử lại</button>
        </div>

        <div class="card-slider-wrapper" id="cardSliderWrapper" style="display:none;">
            <!-- Mũi tên trái -->
            <button class="card-arrow-btn card-arrow-prev" id="arrowPrev" onclick="navigateCard(-1)" aria-label="Trước">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <!-- Stack card -->
            <div id="staffStackContainer"></div>
            <!-- Mũi tên phải -->
            <button class="card-arrow-btn card-arrow-next" id="arrowNext" onclick="navigateCard(1)" aria-label="Tiếp">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
            <!-- Chỉ số trang -->
            <p class="text-center text-white-50 mt-4" style="font-size: 0.82rem; letter-spacing:1px;">
                <span id="cardCounter">1 / 1</span>
            </p>
        </div>
    </main>

    <!-- Modal Feedback -->
    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title font-dancing-script text-white" id="modalStaffName">Feedback về Staff</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-0">
                    <div id="feedbackContent" class="feedback-list-box" style="max-height:220px; overflow-y:auto;">
                    </div>
                    <hr class="text-white-50 my-3">
                    <div class="comment-box-wrapper">
                        <label class="form-label text-white-50 small mb-2"><i class="fa-solid fa-pen-fancy me-1"></i> Để
                            lại lời nhắn của bạn:</label>
                        <textarea id="newCommentInput" class="form-control bg-transparent text-white custom-textarea"
                            rows="2" placeholder="Nhập lời khen hoặc góp ý gửi tới Hắc Tiên..."></textarea>
                        <div id="commentSubmitArea" class="text-end mt-2">
                            <button class="btn btn-submit-comment" onclick="submitComment()">Gửi Bình Luận</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/music-player.js"></script>
    <script>
        // =========================================================
        //  STATE
        // =========================================================
        let allStaff = [];
        let currentFilter = 'all';
        let activeStaffId = null;   // id của staff đang mở feedback modal

        // =========================================================
        //  API HELPER
        // =========================================================
        async function apiGet(params) {
            const url = new URL(FEE_NOIRE_CONFIG.GAS_URL);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const res = await fetch(url.toString());
            return res.json();
        }

        async function apiPost(body) {
            const res = await fetch(FEE_NOIRE_CONFIG.GAS_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        // =========================================================
        //  LOAD STAFF TỪ GAS
        // =========================================================
        async function loadStaff() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('cardSliderWrapper').style.display = 'none';

            try {
                const data = await apiGet({ action: 'getStaff' });
                if (data.status !== 'ok') throw new Error(data.message);

                allStaff = data.staff;
                renderCards(allStaff);

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('cardSliderWrapper').style.display = 'block';
            } catch (e) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            }
        }

        // =========================================================
        //  RENDER CARDS
        // =========================================================
        let currentCardIndex = 0;
        let visibleCards = [];

        function renderCards(staffList) {
            const container = document.getElementById('staffStackContainer');
            container.innerHTML = '';
            currentCardIndex = 0;
            visibleCards = [];

            if (staffList.length === 0) {
                container.innerHTML = '<p class="text-center text-white-50 py-4">Không tìm thấy nhân viên nào.</p>';
                updateArrows();
                return;
            }

            staffList.forEach((staff, idx) => {
                const isLiked = !!localStorage.getItem('liked_' + staff.id);
                const heartClass = isLiked ? 'fa-solid' : 'fa-regular';

                const card = document.createElement('div');
                card.className = 'staff-card-3d';
                card.setAttribute('data-id', staff.id);
                card.setAttribute('data-name', staff.name.toLowerCase());
                card.setAttribute('data-category', staff.category);

                card.innerHTML = `
                <div class="skykid-card d-flex flex-column flex-md-row">
                    <div class="card-left text-center">
                        <div class="fee-noire-brand">Fée Noire</div>
                        <div class="avatar-wrapper">
                            <img src="${staff.img}" alt="${staff.name}" class="img-fluid">
                        </div>
                    </div>
                    <div class="card-right flex-grow-1">
                        <h2 class="card-main-title text-end">Skykid Card</h2>
                        <div class="info-group">
                            <div class="info-row">
                                <span class="info-label">Name</span>
                                <span class="info-value">${staff.name}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Position</span>
                                <span class="info-value">${staff.position}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Zodiac</span>
                                <span class="info-value">${staff.zodiac}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Slogan</span>
                                <span class="info-value" style="font-style:italic; color:rgba(245,246,250,0.8);">"${staff.slogan}"</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Time</span>
                                <span class="info-value">${staff.time}</span>
                            </div>
                        </div>
                        <div class="card-actions d-flex justify-content-between align-items-center mt-3 pt-2">
                            <button class="btn btn-feedback-view" data-bs-toggle="modal" data-bs-target="#feedbackModal"
                                onclick="openFeedback('${staff.id}', '${staff.name}')">
                                <i class="fa-regular fa-comment-dots me-1"></i> Đánh Giá & Cmt
                            </button>
                            <button class="btn btn-like-heart" onclick="likeStaff('${staff.id}', this)">
                                <i class="${heartClass} fa-heart text-danger me-1 icon-heart"></i>
                                <span class="like-count">${staff.likes}</span> Tim
                            </button>
                        </div>
                    </div>
                </div>`;
                container.appendChild(card);
                visibleCards.push(card);
            });

            // Thêm placeholder để wrapper giữ chiều cao
            const ph = document.createElement('div');
            ph.className = 'stack-height-placeholder';
            ph.innerHTML = visibleCards[0].innerHTML;
            container.appendChild(ph);

            applyStackClasses();
            updateArrows();
            updateCounter();
        }

        // =========================================================
        //  STACK CLASS UTILITY
        // =========================================================
        function applyStackClasses() {
            visibleCards.forEach((c, i) => {
                c.classList.remove('active', 'behind-1', 'behind-2', 'animate-from-right', 'animate-from-left');
                const rel = i - currentCardIndex;
                if (rel === 0) c.classList.add('active');
                else if (rel === 1 || rel === -(visibleCards.length - 1)) c.classList.add('behind-1');
                else if (rel === 2 || rel === -(visibleCards.length - 2)) c.classList.add('behind-2');
            });
        }

        // =========================================================
        //  CHUYỂN THẺ BẰNG MŨI TÊN
        // =========================================================
        function navigateCard(dir) {
            if (visibleCards.length <= 1) return;
            const prev = currentCardIndex;
            currentCardIndex = (currentCardIndex + dir + visibleCards.length) % visibleCards.length;

            // Xoá class animation cũ
            visibleCards.forEach(c => c.classList.remove('animate-from-right', 'animate-from-left'));

            applyStackClasses();

            // Thêm animation vào card mới active
            const animClass = dir > 0 ? 'animate-from-right' : 'animate-from-left';
            visibleCards[currentCardIndex].classList.add(animClass);

            updateArrows();
            updateCounter();
        }

        function updateArrows() {
            const prev = document.getElementById('arrowPrev');
            const next = document.getElementById('arrowNext');
            if (!prev || !next) return;
            if (visibleCards.length <= 1) {
                prev.disabled = true; next.disabled = true;
            } else {
                prev.disabled = false; next.disabled = false;
            }
        }

        function updateCounter() {
            const el = document.getElementById('cardCounter');
            if (el && visibleCards.length > 0)
                el.textContent = `${currentCardIndex + 1} / ${visibleCards.length}`;
        }

        // =========================================================
        //  BỘ LỌC & TÌM KIẾM
        // =========================================================
        function filterStaff(category, btn) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('staffSearchInput').value = '';

            const filtered = category === 'all'
                ? allStaff
                : allStaff.filter(s => s.category === category);
            renderCards(filtered);
        }

        function searchStaff() {
            const keyword = document.getElementById('staffSearchInput').value.toLowerCase().trim();
            const filtered = keyword === ''
                ? (currentFilter === 'all' ? allStaff : allStaff.filter(s => s.category === currentFilter))
                : allStaff.filter(s => s.name.toLowerCase().includes(keyword));
            renderCards(filtered);
        }

        // =========================================================
        //  LIKE — ghi vào GAS
        // =========================================================
        async function likeStaff(staffId, btn) {
            const heartIcon = btn.querySelector('.icon-heart');
            const likeText = btn.querySelector('.like-count');
            const isLiked = !!localStorage.getItem('liked_' + staffId);
            const delta = isLiked ? -1 : 1;

            // Optimistic UI
            heartIcon.classList.toggle('fa-solid', !isLiked);
            heartIcon.classList.toggle('fa-regular', isLiked);
            likeText.innerText = parseInt(likeText.innerText) + delta;
            isLiked ? localStorage.removeItem('liked_' + staffId)
                : localStorage.setItem('liked_' + staffId, '1');

            try {
                const res = await apiPost({ action: 'likeFeedback', staffId, delta });
                if (res.status === 'ok') likeText.innerText = res.likes;
            } catch (_) {
                // Rollback nếu lỗi mạng
                heartIcon.classList.toggle('fa-solid', isLiked);
                heartIcon.classList.toggle('fa-regular', !isLiked);
                likeText.innerText = parseInt(likeText.innerText) - delta;
                isLiked ? localStorage.setItem('liked_' + staffId, '1')
                    : localStorage.removeItem('liked_' + staffId);
            }
        }

        // =========================================================
        //  FEEDBACK MODAL
        // =========================================================
        async function openFeedback(staffId, staffName) {
            activeStaffId = staffId;
            document.getElementById('modalStaffName').innerText = 'Đánh Giá Về ' + staffName;
            document.getElementById('newCommentInput').value = '';
            document.getElementById('feedbackContent').innerHTML =
                '<div class="text-center text-white-50 small py-3"><div class="spinner-border spinner-border-sm me-2"></div>Đang tải...</div>';
            await renderFeedbacks();
        }

        async function renderFeedbacks() {
            const box = document.getElementById('feedbackContent');
            try {
                const data = await apiGet({ action: 'getFeedbacks', staffId: activeStaffId });
                if (data.status !== 'ok') throw new Error();

                if (data.feedbacks.length === 0) {
                    box.innerHTML = '<div class="text-white-50 text-center small my-3">Chưa có bình luận nào. Hãy là người đầu tiên nhắn gửi điều dễ thương!</div>';
                    return;
                }
                box.innerHTML = data.feedbacks.map(fb =>
                    `<div class="feedback-item-text"><i class="fa-solid fa-star text-warning me-2"></i>${fb.content}</div>`
                ).join('');
            } catch (_) {
                box.innerHTML = '<div class="text-white-50 text-center small my-3">Không thể tải bình luận.</div>';
            }
        }

        async function submitComment() {
            const txt = document.getElementById('newCommentInput').value.trim();
            if (!txt) return;

            const btn = document.querySelector('#commentSubmitArea .btn-submit-comment');
            btn.disabled = true;
            btn.innerText = 'Đang gửi...';

            try {
                const res = await apiPost({ action: 'addFeedback', staffId: activeStaffId, content: txt });
                if (res.status === 'ok') {
                    document.getElementById('newCommentInput').value = '';
                    await renderFeedbacks();
                }
            } catch (_) { }

            btn.disabled = false;
            btn.innerText = 'Gửi Bình Luận';
        }

        // =========================================================
        //  KHỞI CHẠY
        // =========================================================
        loadStaff();
    </script>
</body>

</html>
